<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Islamic Q&A</title>
    <style>
      :root {
        --bg: #0f1117;
        --panel: #171a23;
        --panel-2: #1f2330;
        --border: #262a36;
        --text: #e6e8ee;
        --muted: #8b91a3;
        --accent: #4f8cff;
        --accent-hover: #3a78ee;
        --error: #ff6b6b;
        --warn: #f0b95e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 80px;
      }
      h1 { margin: 8px 0 24px; font-size: 22px; font-weight: 600; }
      .container { width: 100%; max-width: 820px; }
      form { display: flex; gap: 8px; margin-bottom: 16px; }
      input[type="text"] {
        flex: 1; padding: 12px 14px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        color: var(--text); font-size: 15px; outline: none;
      }
      input[type="text"]:focus { border-color: var(--accent); }
      button {
        padding: 0 18px; background: var(--accent); color: white; border: none;
        border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      button:hover:not(:disabled) { background: var(--accent-hover); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .status {
        font-size: 12px; color: var(--muted); margin-bottom: 12px;
        min-height: 16px; font-family: ui-monospace, Menlo, monospace;
      }

      .card {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 12px; padding: 18px; margin-bottom: 14px;
      }
      .label {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
        color: var(--muted); margin-bottom: 10px;
      }
      .answer { white-space: pre-wrap; line-height: 1.6; font-size: 15px; }
      .answer.empty { color: var(--muted); font-style: italic; }
      .cursor {
        display: inline-block; width: 7px; height: 16px; background: var(--accent);
        margin-left: 2px; vertical-align: middle; animation: blink 1s steps(2,start) infinite;
      }
      @keyframes blink { to { visibility: hidden; } }

      .meta { font-size: 12px; color: var(--muted); text-align: right; margin-top: 8px; }
      .error { color: var(--error); background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.4); }

      .rewrite-row { font-size: 13px; padding: 4px 0; color: var(--muted); }
      .rewrite-row strong { color: var(--text); margin-right: 6px; }

      .sources { font-size: 13px; }
      .source { padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--muted); }
      .source:last-child { border-bottom: none; }
      .source strong { color: var(--text); }

      .chunk { padding: 10px 0; border-bottom: 1px solid var(--border); }
      .chunk:last-child { border-bottom: none; }
      .chunk-head { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
      .chunk-text {
        white-space: pre-wrap; font-size: 13px; line-height: 1.5; color: var(--text);
        background: var(--panel-2); padding: 8px 10px; border-radius: 6px;
      }
      .chunk.below { opacity: 0.55; }
      .chunk.below .chunk-head::after { content: " (below threshold)"; color: var(--warn); font-style: italic; }

      .toggle { color: var(--muted); text-decoration: none; cursor: pointer; }
      .toggle:hover { color: var(--text); }
      .hidden { display: none; }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Islamic Q&amp;A</h1>

      <form id="qa-form">
        <input id="q" type="text" placeholder="Ask a question (e.g. Ibrahim son name?)" autocomplete="off" required />
        <button id="submit" type="submit">Ask</button>
      </form>

      <div id="status" class="status"></div>

      <div id="rewrite-card" class="card hidden">
        <div class="label">
          <a class="toggle" id="toggle-rewrite">Optimized query (click to toggle)</a>
        </div>
        <div id="rewrite" class="hidden"></div>
      </div>

      <div id="answer-card" class="card hidden">
        <div class="label">Answer</div>
        <div id="answer" class="answer"></div>
        <div id="meta" class="meta"></div>
      </div>

      <div id="sources-card" class="card hidden">
        <div class="label">Sources</div>
        <div id="sources" class="sources"></div>
      </div>

      <div id="context-card" class="card hidden">
        <div class="label">
          <a class="toggle" id="toggle-context">Retrieved context (click to toggle)</a>
        </div>
        <div id="context" class="sources hidden"></div>
      </div>

      <div id="error-card" class="card error hidden">
        <div class="label">Error</div>
        <div id="error"></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const form = $("qa-form"), input = $("q"), submitBtn = $("submit");
      const statusEl = $("status");
      const rewriteCard = $("rewrite-card"), rewriteEl = $("rewrite"), toggleRewrite = $("toggle-rewrite");
      const answerCard = $("answer-card"), answerEl = $("answer"), metaEl = $("meta");
      const sourcesCard = $("sources-card"), sourcesEl = $("sources");
      const contextCard = $("context-card"), contextEl = $("context"), toggleContext = $("toggle-context");
      const errorCard = $("error-card"), errorEl = $("error");

      toggleRewrite.addEventListener("click", () => rewriteEl.classList.toggle("hidden"));
      toggleContext.addEventListener("click", () => contextEl.classList.toggle("hidden"));

      let activeSource = null;

      function reset() {
        for (const c of [rewriteCard, answerCard, sourcesCard, contextCard, errorCard]) c.classList.add("hidden");
        answerEl.textContent = ""; answerEl.classList.remove("empty");
        rewriteEl.innerHTML = ""; sourcesEl.innerHTML = ""; contextEl.innerHTML = "";
        metaEl.textContent = ""; errorEl.textContent = "";
        statusEl.textContent = "";
      }

      function showCursor() {
        const c = document.createElement("span"); c.className = "cursor"; c.id = "cursor";
        answerEl.appendChild(c);
      }
      function removeCursor() { const c = $("cursor"); if (c) c.remove(); }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
      }

      function renderRewrite(rw) {
        if (!rw) return;
        const rows = [];
        if (rw.paraphrase) rows.push(`<div class="rewrite-row"><strong>Paraphrase:</strong>${escapeHtml(rw.paraphrase)}</div>`);
        if (rw.hypothetical) rows.push(`<div class="rewrite-row"><strong>Hypothetical:</strong>${escapeHtml(rw.hypothetical)}</div>`);
        if (rw.keywords) rows.push(`<div class="rewrite-row"><strong>Keywords:</strong>${escapeHtml(rw.keywords)}</div>`);
        if (rows.length) {
          rewriteCard.classList.remove("hidden");
          rewriteEl.innerHTML = rows.join("");
        }
      }

      function renderChunks(chunks) {
        if (!chunks || !chunks.length) return;
        contextCard.classList.remove("hidden");
        contextEl.innerHTML = chunks.map((c, i) =>
          `<div class="chunk${c.belowThreshold ? " below" : ""}">` +
          `<div class="chunk-head">[${i + 1}] ${escapeHtml(c.source)} &middot; chunk ${c.chunk} &middot; score ${c.score}</div>` +
          `<div class="chunk-text">${escapeHtml(c.preview)}</div></div>`
        ).join("");
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const q = input.value.trim();
        if (!q) return;

        if (activeSource) activeSource.close();
        reset();
        submitBtn.disabled = true; submitBtn.textContent = "Thinking...";
        statusEl.textContent = "Sending question...";

        const url = "/api/ask?q=" + encodeURIComponent(q);
        const es = new EventSource(url);
        activeSource = es;

        let textBuf = "", started = false;

        es.addEventListener("stage", (ev) => {
          const { stage, info } = JSON.parse(ev.data);
          if (stage === "rewriting") statusEl.textContent = "Optimizing your question with the model...";
          else if (stage === "searching") statusEl.textContent = `Searching index with ${info.queries.length} variant${info.queries.length>1?"s":""}...`;
          else if (stage === "generating") {
            statusEl.textContent = `Generating answer (${info.chunkCount} chunks, ${info.contextChars} chars of context)...`;
            answerCard.classList.remove("hidden");
            showCursor();
          } else if (stage === "no_context") {
            statusEl.textContent = "No relevant chunks above threshold.";
          }
        });

        es.addEventListener("token", (ev) => {
          if (!started) { started = true; statusEl.textContent = "Streaming answer..."; }
          const { token } = JSON.parse(ev.data);
          textBuf += token;
          removeCursor();
          answerEl.textContent = textBuf;
          showCursor();
        });

        es.addEventListener("done", (ev) => {
          const data = JSON.parse(ev.data);
          removeCursor();

          answerCard.classList.remove("hidden");
          if (!data.answer || !data.answer.trim()) {
            answerEl.textContent = "(empty response)"; answerEl.classList.add("empty");
          } else {
            answerEl.textContent = data.answer;
          }

          metaEl.textContent = `Took ${(data.tookMs / 1000).toFixed(1)}s`;
          renderRewrite(data.rewrite);

          if (data.sources && data.sources.length) {
            sourcesCard.classList.remove("hidden");
            sourcesEl.innerHTML = data.sources.map((s) =>
              `<div class="source"><strong>${escapeHtml(s.source)}</strong> &middot; chunk ${s.chunk} &middot; score ${s.score}</div>`
            ).join("");
          }

          renderChunks(data.chunks);

          statusEl.textContent = "";
          es.close(); activeSource = null;
          submitBtn.disabled = false; submitBtn.textContent = "Ask";
        });

        es.addEventListener("error", (ev) => {
          removeCursor();
          let msg = "Connection error";
          if (ev.data) { try { msg = JSON.parse(ev.data).message || msg; } catch (_) {} }
          errorCard.classList.remove("hidden");
          errorEl.textContent = msg;
          statusEl.textContent = "";
          es.close(); activeSource = null;
          submitBtn.disabled = false; submitBtn.textContent = "Ask";
        });
      });
    </script>
  </body>
</html>
